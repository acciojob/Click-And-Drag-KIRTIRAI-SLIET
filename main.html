<!DOCTYPE html>
<html lang="en">
	<head>
	  <meta charset="UTF-8">
	  <title>Click and Drag</title>
	  <link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="items">
			<div class="item item1">01</div>
			<div class="item item2">02</div>
			<div class="item item3">03</div>
			<div class="item item4">04</div>
			<div class="item item5">05</div>
			<div class="item item6">06</div>
			<div class="item item7">07</div>
			<div class="item item8">08</div>
			<div class="item item9">09</div>
			<div class="item item10">10</div>
			<div class="item item11">11</div>
			<div class="item item12">12</div>
			<div class="item item13">13</div>
			<div class="item item14">14</div>
			<div class="item item15">15</div>
			<div class="item item16">16</div>
			<div class="item item17">17</div>
			<div class="item item18">18</div>
			<div class="item item19">19</div>
			<div class="item item20">20</div>
			<div class="item item21">21</div>
			<div class="item item22">22</div>
			<div class="item item23">23</div>
			<div class="item item24">24</div>
			<div class="item item25">25</div>
		</div>
	
		<script>
		//Your code goes here
const container = document.querySelector('.container');

let activeCube = null;
let offsetX = 0;
let offsetY = 0;

container.addEventListener('mousedown', (e) => {
    if (!e.target.classList.contains('cube')) return;

    activeCube = e.target;

    const rect = activeCube.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    // Convert to absolute positioning
    activeCube.style.position = 'absolute';
    activeCube.style.zIndex = 1000;

    moveAt(e.pageX, e.pageY);
});

document.addEventListener('mousemove', (e) => {
    if (!activeCube) return;
    moveAt(e.pageX, e.pageY);
});

document.addEventListener('mouseup', () => {
    activeCube = null;
});

function moveAt(pageX, pageY) {
    const containerRect = container.getBoundingClientRect();

    let newLeft = pageX - containerRect.left - offsetX;
    let newTop = pageY - containerRect.top - offsetY;

    // Boundary constraints
    const maxLeft = container.clientWidth - activeCube.offsetWidth;
    const maxTop = container.clientHeight - activeCube.offsetHeight;

    newLeft = Math.max(0, Math.min(newLeft, maxLeft));
    newTop = Math.max(0, Math.min(newTop, maxTop));

    activeCube.style.left = newLeft + 'px';
    activeCube.style.top = newTop + 'px';
}
		</script>
	</body>
</html>
